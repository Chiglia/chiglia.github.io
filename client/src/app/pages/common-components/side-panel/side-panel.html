<div
  class="flex flex-col w-full h-full bg-slate-50 dark:bg-surface-900 pt-6 justify-between border-r border-surface-200 dark:border-surface-700"
>
  <div>
    <div class="text-center py-4 border-b border-surface-200 dark:border-surface-700 mx-3 mb-3">
      <p-avatar
        icon="pi pi-user"
        size="xlarge"
        shape="circle"
        styleClass="bg-primary text-white shadow-sm"
      ></p-avatar>
      <h2 class="text-primary font-bold text-xl mt-3 mb-1">Davide Chigliaro</h2>
      <p class="text-slate-600 dark:text-slate-400 text-sm m-0">Sviluppatore Web</p>
    </div>

    <app-buttons></app-buttons>
  </div>

  <div class="grid grid-cols-1 gap-2 pb-5 pl-5">
    <p-button
      severity="contrast"
      [rounded]="true"
      [icon]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'"
      (click)="toggleTheme()"
      styleClass="hover:scale transition-all transition-duration-200"
    ></p-button>
  </div>
</div>
