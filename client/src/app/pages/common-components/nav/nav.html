<div
  class="flex items-center justify-between p-3 bg-bg-surface-100 dark:bg-surface-800 dark:bg-surface-800"
>
  <!-- Logo -->
  <div routerLink="/" class="flex items-center gap-2">
    <i class="pi pi-user text-primary"></i>
    <span class="text-xl">Davide<span class="text-primary font-bold">Chigliaro</span> </span>
  </div>
  <!-- Icona mobile -->
  <p-button icon="pi pi-bars" (click)="menuVisible = !menuVisible" text />
</div>

<!-- Menu mobile -->
<p-drawer [(visible)]="menuVisible" position="right">
  <app-buttons></app-buttons>

  <ng-template #footer>
    <p-button
      severity="contrast"
      [rounded]="true"
      [icon]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'"
      (click)="toggleTheme()"
      class="mr-2"
    />
  </ng-template>
</p-drawer>
